<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Pulse Grid">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1e2430"/>
      <stop offset="55%" stop-color="#12161c"/>
      <stop offset="100%" stop-color="#080a0d"/>
    </radialGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded tile -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Tunnel rings -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="url(#arc)" stroke-width="0.75" opacity="0.45"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.35"/>
  <!-- Crosshair -->
  <g stroke="#f4f4f5" stroke-width="1.6" stroke-linecap="round" filter="url(#glow)">
    <line x1="16" y1="3.5" x2="16" y2="9"/>
    <line x1="16" y1="23" x2="16" y2="28.5"/>
    <line x1="3.5" y1="16" x2="9" y2="16"/>
    <line x1="23" y1="16" x2="28.5" y2="16"/>
  </g>
  <!-- Hit marker -->
  <circle cx="16" cy="16" r="2.2" fill="#a855f7"/>
  <circle cx="16" cy="16" r="1" fill="#faf5ff"/>
  <!-- Corner ticks -->
  <g stroke="#22d3ee" stroke-width="1" stroke-linecap="round" opacity="0.55">
    <path d="M6 8.5 L6 6 L8.5 6"/>
    <path d="M23.5 6 L26 6 L26 8.5"/>
    <path d="M6 23.5 L6 26 L8.5 26"/>
    <path d="M23.5 26 L26 26 L26 23.5"/>
  </g>
</svg>
